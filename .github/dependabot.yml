# Dependabot version updates.
#
# Note what is deliberately NOT covered: the Ubuntu ISO URLs in releases/*.pkrvars.hcl
# and the Checkmk agent version in common.pkrvars.hcl. Both are pinned on purpose
# and reviewed by hand — see the comments at those pins.
#
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
